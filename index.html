<!-- 🔥 EXIT POPUP -->
<div id="exit-popup" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;">
  <div style="background:#fff;padding:30px;border-radius:10px;max-width:400px;text-align:center">
    <h2 style="color:#c0392b">WAIT — Don't Risk Your Case</h2>
    <p>You may lose important rights if you leave now. Finish your filing now.</p>
    <a href="#services" style="background:#F45A27;color:#fff;padding:12px 20px;border-radius:6px;text-decoration:none;font-weight:700;">Finish My Case →</a>
  </div>
</div>


<script>
// 🔥 AUTO NAV + STICKY CTA
const sections = [
  { id: "divorce-card", nav: "nav-divorce", link: "https://easydivorcefiling.gavel.io/portal/bundles/ea88bd85-278e-47bd-a6b5-4b9ca0890a32", text: "Start Divorce Now →" },
  { id: "estate-card", nav: "nav-estate", link: "https://easydivorcefiling.gavel.io/portal/bundles/f43856a4-c2b5-47ef-bd49-b265fa666d92", text: "Protect My Assets Now →" },
  { id: "immigration-card", nav: "nav-immigration", link: "https://easydivorcefiling.gavel.io/portal/bundles/0e91b989-bf1a-42b2-b972-3d32faa7f1e7", text: "Reopen Case Now →" }
];

const sticky = document.getElementById("sticky-cta");

function clearActive() {
  document.querySelectorAll(".nav-link").forEach(n => n.classList.remove("active"));
}

window.addEventListener("scroll", () => {
  let current = null;

  sections.forEach(section => {
    const el = document.getElementById(section.id);
    if (!el) return;

    const rect = el.getBoundingClientRect();
    if (rect.top <= 150 && rect.bottom >= 150) current = section;
  });

  if (current) {
    clearActive();
    document.getElementById(current.nav)?.classList.add("active");

    sticky.style.display = "block";
    sticky.href = current.link;
    sticky.innerText = current.text;
  } else {
    sticky.style.display = "none";
  }
});


// 🔥 LIVE ACTIVITY
const messages = [
"Someone just reopened their immigration case",
"A user just filed for divorce",
"Someone checked inheritance rights",
"A case was just submitted"
];

setInterval(() => {
  const popup = document.getElementById("live-popup");
  popup.innerText = messages[Math.floor(Math.random() * messages.length)];
  popup.style.display = "block";
  setTimeout(() => popup.style.display = "none", 4000);
}, 9000);


// 🔥 EXIT INTENT
let shown = false;
document.addEventListener("mouseleave", function(e) {
  if (e.clientY < 10 && !shown) {
    document.getElementById("exit-popup").style.display = "flex";
    shown = true;
  }
});
</script>
