<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EasyLegalFiling</title>

<style>
html { scroll-behavior: smooth; }
body { font-family: Arial; margin:0; }

/* NAV ACTIVE */
.nav-link.active { color:#4b2aad; font-weight:700; }

/* STICKY CTA */
.sticky-cta {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #F45A27;
  color: #fff;
  font-weight: 800;
  padding: 14px 28px;
  border-radius: 999px;
  text-decoration: none;
  box-shadow: 0 8px 30px rgba(244,90,39,.4);
  z-index: 999;
  display: none;
}
</style>
</head>

<body>

<!-- HEADER -->
<nav style="position:fixed;top:0;width:100%;background:#fff;padding:15px;z-index:1000">
  <a class="nav-link" id="nav-services" href="#services">Services</a>
  <a class="nav-link" id="nav-divorce" href="#divorce-card">Divorce</a>
  <a class="nav-link" id="nav-estate" href="#estate-card">Estate</a>
  <a class="nav-link" id="nav-immigration" href="#immigration-card">Immigration</a>
</nav>

<div style="height:80px"></div>

<!-- SERVICES -->
<section id="services" style="padding:100px 20px;background:#f5f5f5">
  <h1>Find Your Legal Solution</h1>
</section>

<!-- IMMIGRATION -->
<section id="immigration-card" style="padding:120px 20px">
  <h2>Immigration Court Relief</h2>
  <a href="https://easydivorcefiling.gavel.io/portal/bundles/0e91b989-bf1a-42b2-b972-3d32faa7f1e7">Start Immigration Case</a>
</section>

<!-- DIVORCE -->
<section id="divorce-card" style="padding:120px 20px;background:#f9f9f9">
  <h2>Divorce Filing</h2>
  <a href="https://easydivorcefiling.gavel.io/portal/bundles/ea88bd85-278e-47bd-a6b5-4b9ca0890a32">Start Divorce</a>
</section>

<!-- ESTATE -->
<section id="estate-card" style="padding:120px 20px">
  <h2>Estate & Inheritance</h2>
  <a href="https://easydivorcefiling.gavel.io/portal/bundles/f43856a4-c2b5-47ef-bd49-b265fa666d92">Start Estate Case</a>
</section>

<!-- STICKY BUTTON -->
<a id="sticky-cta" class="sticky-cta">Start Now →</a>

<script>
const sections = [
  { id: "services", nav: "nav-services", link: "#services" },
  { id: "divorce-card", nav: "nav-divorce", link: "https://easydivorcefiling.gavel.io/portal/bundles/ea88bd85-278e-47bd-a6b5-4b9ca0890a32" },
  { id: "estate-card", nav: "nav-estate", link: "https://easydivorcefiling.gavel.io/portal/bundles/f43856a4-c2b5-47ef-bd49-b265fa666d92" },
  { id: "immigration-card", nav: "nav-immigration", link: "https://easydivorcefiling.gavel.io/portal/bundles/0e91b989-bf1a-42b2-b972-3d32faa7f1e7" }
];

const sticky = document.getElementById("sticky-cta");

function clearActive() {
  sections.forEach(s => {
    const el = document.getElementById(s.nav);
    if (el) el.classList.remove("active");
  });
}

window.addEventListener("scroll", () => {
  let current = null;

  sections.forEach(section => {
    const el = document.getElementById(section.id);
    if (!el) return;

    const rect = el.getBoundingClientRect();

    if (rect.top <= 150 && rect.bottom >= 150) {
      current = section;
    }
  });

  if (current) {
    clearActive();

    const activeNav = document.getElementById(current.nav);
    if (activeNav) activeNav.classList.add("active");

    sticky.style.display = "block";
    sticky.href = current.link;
  } else {
    sticky.style.display = "none";
  }
});
</script>

</body>
</html>
